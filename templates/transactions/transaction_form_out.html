{% extends 'base_with_sidebar.html' %}
{% load i18n %}

{% block title %}{% trans "برداشت از حساب" %}{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 100px);">
    <div class="card shadow mb-4" style="width:100%; max-width:700px;">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">{% trans "ثبت برداشت از حساب" %}</h6>
        </div>
        <div class="card-body py-3">
            <form method="post">
                {% csrf_token %}
                <div class="mb-2">
                    <label class="form-label small fw-bold">{% trans "تاریخ (شمسی)" %}</label>
                    <input type="text" name="transaction_date" id="jalali_date" class="form-control form-control-sm" value="{{ today_jalali }}" readonly required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold">{% trans "نوع شخص" %}</label>
                    <select name="person_type" id="person_type" class="form-select form-select-sm" required>
                        <option value="">انتخاب کنید</option>
                        <option value="CUSTOMER">مشتری</option>
                        <option value="SUPPLIER">تهیه‌کننده</option>
                        <option value="MISC">متفرقه</option>
                    </select>
                </div>
                <div class="mb-2" id="person_select_container">
                    <label class="form-label small fw-bold">{% trans "انتخاب شخص" %}</label>
                    <select name="person_id" id="person_id" class="form-select form-select-sm" required disabled>
                        <option value="">ابتدا نوع شخص را انتخاب کنید</option>
                    </select>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold">{% trans "مبلغ" %}</label>
                    <input type="number" step="0.01" name="amount" class="form-control form-control-sm" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-bold">{% trans "توضیحات" %}</label>
                    <textarea name="description" class="form-control form-control-sm" rows="2"></textarea>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <button type="submit" class="btn btn-danger btn-sm px-4">{% trans "ثبت برداشت" %}</button>
                    <a href="{% url 'transactions:transaction_list' %}" class="btn btn-secondary btn-sm px-4">{% trans "انصراف" %}</a>
                </div>
            </form>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://unpkg.com/persian-datepicker@latest/dist/css/persian-datepicker.min.css"/>
<script src="https://unpkg.com/persian-date@latest/dist/persian-date.min.js"></script>
<script src="https://unpkg.com/persian-datepicker@latest/dist/js/persian-datepicker.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        $("#jalali_date").pDatepicker({
            format: 'YYYY/MM/DD',
            initialValue: true,
            calendarType: 'persian',
            observer: true,
            persianDigits: true,
            monthNames: ['حمل', 'ثور', 'جوزا', 'سرطان', 'اسد', 'سنبله', 'میزان', 'عقرب', 'قوس', 'جدی', 'دلو', 'حوت']
        });
    });

    const customers = {{ customers_json|safe }};
    const suppliers = {{ suppliers_json|safe }};
    const miscPersons = {{ misc_persons_json|safe }};

    console.log("مشتریان:", customers);
    console.log("تأمین‌کنندگان:", suppliers);
    console.log("متفرقه:", miscPersons);

    function populatePersonSelect(type) {
        const personSelect = document.getElementById('person_id');
        personSelect.innerHTML = '<option value="">انتخاب کنید</option>';
        let options = [];
        if (type === 'CUSTOMER') options = customers;
        else if (type === 'SUPPLIER') options = suppliers;
        else if (type === 'MISC') options = miscPersons;

        if (options.length === 0) {
            personSelect.disabled = true;
            personSelect.innerHTML = '<option value="">هیچ شخصی یافت نشد</option>';
            return;
        }

        options.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt.id;
            option.textContent = opt.name;
            personSelect.appendChild(option);
        });
        personSelect.disabled = false;
    }

    const personTypeSelect = document.getElementById('person_type');
    personTypeSelect.addEventListener('change', function() {
        const selectedType = this.value;
        if (selectedType) {
            populatePersonSelect(selectedType);
        } else {
            const personSelect = document.getElementById('person_id');
            personSelect.disabled = true;
            personSelect.innerHTML = '<option value="">ابتدا نوع شخص را انتخاب کنید</option>';
        }
    });
</script>
{% endblock %}
